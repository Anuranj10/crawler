version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: scholarship_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: scholarship_backend
    volumes:
      - ./backend:/app
      - ./scraper:/app/scraper
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  scheduler:
    build: ./backend
    container_name: scholarship_scheduler
    command: python scheduler.py
    volumes:
      - ./backend:/app
      - ./scraper:/app/scraper
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
    restart: unless-stopped
